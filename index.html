  <!-- React + Babel via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <script type="text/babel" data-type="module">
    const { useState } = React;

    // ============================================================
    // THEME
    // ============================================================
    const T = {
      bg: "#f8f9fb",
      surface: "#ffffff",
      surfaceAlt: "#f1f4f8",
      border: "#e2e7ef",
      borderLight: "#edf0f5",
      text: "#0f1923",
      textSecondary: "#4a5568",
      textMuted: "#8a96a8",
      blue: "#2563eb",
      blueDark: "#1d4ed8",
      blueLight: "#eff6ff",
      blueMid: "#bfdbfe",
      gray: "#64748b",
      grayLight: "#f1f5f9",
      success: "#16a34a",
      successLight: "#f0fdf4",
      warning: "#d97706",
      warningLight: "#fffbeb",
      danger: "#dc2626",
    };

    const PHASES = [
      { name: "Base",  weeks: [1,2,3,4],        color: "#2563eb", light: "#eff6ff", border: "#bfdbfe" },
      { name: "Build", weeks: [5,6,7,8,9,10],   color: "#0369a1", light: "#f0f9ff", border: "#bae6fd" },
      { name: "Peak",  weeks: [11,12,13],        color: "#1e3a8a", light: "#eef2ff", border: "#93c5fd" },
      { name: "Taper", weeks: [14,15,16],        color: "#475569", light: "#f8fafc", border: "#cbd5e1" },
    ];

    // ============================================================
    // PROGRAM DATA
    // ============================================================
    const PROGRAM_START = new Date(2026, 2, 16);
    const PROGRAM_END   = new Date(2026, 5, 28);

    function getPhase(w) { return PHASES.find(p => p.weeks.includes(w)) || PHASES[0]; }
    function getWeekNum(date) {
      const diff = date - PROGRAM_START;
      return Math.max(1, Math.min(16, Math.floor(diff / (7*24*60*60*1000)) + 1));
    }
    function getPhaseData(w) {
      if (w <= 4)  return { ruck:"2–2.5 mi", weight:"30 lb", run:"30–40 min", hike:"10–12 mi", hikeWeight:"30 lb" };
      if (w <= 10) return { ruck:"3–3.5 mi", weight:"35 lb", run:"40–60 min", hike:"12–16 mi", hikeWeight:"35 lb" };
      if (w <= 13) return { ruck:"4 mi",     weight:"40 lb", run:"60–75 min", hike:"15–18 mi", hikeWeight:"40 lb" };
      return              { ruck:"2–2.5 mi", weight:"20–25 lb", run:"30–50 min", hike:"6–12 mi", hikeWeight:"20–25 lb" };
    }
    function getWedType(w)    { return w % 2 === 1 ? "zone2hills" : "norwegian"; }
    function getHyroxCycle(w) { return ((w - 1) % 3) + 1; }

    // ============================================================
    // WORKOUT DATA
    // ============================================================
    function getDayWorkout(dow, weekNum) {
      const pd = getPhaseData(weekNum);
      const wedType = getWedType(weekNum);
      const hc = getHyroxCycle(weekNum);
      const hLabel = { 1:"Week A — Heavy/Slow", 2:"Week B — Cardio/Fast", 3:"Week C — Race Simulation" }[hc];

      const days = {
        1: {
          title:"Legs + Ruck", icon:"🏔️",
          sessions:[
            { time:"AM", label:"Ruck", items:[
              { id:"mon-ruck", text:`Ruck ${pd.ruck} @ ${pd.weight}`, type:"cardio", rpe:"RPE 5–6" },
            ]},
            { time:"PM", label:"Hip Symmetry + Legs", items:[
              { id:"mon-hipsym",  text:"Hip Symmetry warm-up — 10 min", type:"warmup" },
              { id:"mon-dl",      text:"DB Deadlift", type:"strength", sets:4, reps:"5–8", rpe:"RPE 7–8",
                note:"Push floor away, 2s lower, dead stop each rep. Add reps toward ceiling before adding weight.",
                progressive:true, repCeiling:{base:10,build:8,peak:6}, superset:"A" },
              { id:"mon-abwheel", text:"Ab Wheel Rollout", type:"strength", sets:3, reps:"8–12", rpe:"RPE 7",
                note:"Superset A. Rest 90s between rounds.", superset:"A" },
              { id:"mon-bss",     text:"Bulgarian Split Squat", type:"strength", sets:3, reps:"8–10/leg", rpe:"RPE 8",
                note:"Heavy DBs. Superset B. Rest 90s.", superset:"B",
                progressive:true, repCeiling:{base:12,build:10,peak:8} },
              { id:"mon-stepup",  text:"Step-Ups with DBs", type:"strength", sets:3, reps:"10/leg", rpe:"RPE 7",
                note:"Drive through heel, full hip extension at top. Superset B.", superset:"B" },
              { id:"mon-carry",   text:"Suitcase Carry", type:"strength", sets:2, reps:"40m/side", rpe:"RPE 7",
                note:"Heavy KB. Superset C. Rest 60s.", superset:"C" },
              { id:"mon-thrust",  text:"Hip Thrust", type:"strength", sets:3, reps:"10–12", rpe:"RPE 7",
                note:"Squeeze hard at top, 1–2s hold. Superset C.", superset:"C" },
            ]},
          ]
        },
        2: {
          title:"Hyrox", icon:"⚡",
          sessions:[
            { time:"AM", label:"Recovery Walk", items:[
              { id:"tue-walk", text:"Walk 1–2 miles — easy recovery", type:"cardio", rpe:"RPE 4" },
            ]},
            { time:"PM", label:`Hyrox Circuit — ${hLabel}`, items:[
              { id:"tue-hipsym",    text:"Hip Symmetry warm-up — 10 min", type:"warmup" },
              { id:"tue-r1",        text:"Row 500m", type:"cardio", note: hc===1?"Steady pace":hc===2?"Push pace":"Race pace" },
              { id:"tue-lunge",     text:"Sandbag Lunges", type:"strength", sets:1, reps:"20/leg",
                note: hc===1?"50–60 lb — heavy, controlled":hc===2?"40–50 lb — faster":"50–60 lb — race pace" },
              { id:"tue-r2",        text:"Row 500m", type:"cardio" },
              { id:"tue-kbs",       text:"KB Swings", type:"strength", sets:1, reps:"20",
                note: hc===1?"32–35 kg — heavy":hc===2?"24–28 kg — fast":"32 kg — race pace" },
              { id:"tue-r3",        text:"Row 500m", type:"cardio" },
              { id:"tue-dball",     text:"D-Ball Over Shoulder", type:"strength", sets:1, reps:"3–4/side",
                note:"100 lb — full reset each rep, explosive hip drive" },
              { id:"tue-r4",        text:"Row 500m", type:"cardio" },
              { id:"tue-boxstep",   text:"Box Step-Ups with DBs", type:"strength", sets:1, reps:"20/leg",
                note: hc===1?"35–40 lb DBs":hc===2?"25–30 lb — fast":"35 lb — race pace" },
              { id:"tue-r5",        text:"Row 500m", type:"cardio" },
              { id:"tue-farmers",   text:"Farmers Carry", type:"strength", sets:1, reps:"60m",
                note: hc===1?"50–60 lb/hand — heavy":"40–50 lb/hand — fast" },
              { id:"tue-r6",        text:"Row 500m", type:"cardio" },
              { id:"tue-dbearcarry",text:"D-Ball Bear Hug Carry", type:"strength", sets:1, reps:"30m",
                note:"100 lb — grip and grind" },
              { id:"tue-r7",        text:"Row 500m", type:"cardio" },
              { id:"tue-burpee",    text:"Burpee Broad Jumps over Plyo Box", type:"strength", sets:1, reps:"10",
                note:"Full extension every rep" },
            ]},
          ]
        },
        3: {
          title: wedType==="zone2hills"?"Zone 2 + Hills":"Norwegian 4x4", icon:"🚣",
          sessions:[
            { time:"AM", label:"Ruck", items:[
              { id:"wed-ruck", text:`Ruck ${pd.ruck} @ ${pd.weight}`, type:"cardio", rpe:"RPE 5–6" },
            ]},
            { time:"PM", label: wedType==="zone2hills"?"Zone 2 Run + Hill Repeats":"Norwegian 4x4 — Rowing Machine",
              items: wedType==="zone2hills" ? [
                { id:"wed-z2",    text:`Zone 2 Run — ${pd.run}`, type:"cardio", rpe:"RPE 5–6", note:"Nasal breathing. Conversational pace." },
                { id:"wed-hills", text:"Hill Repeats", type:"cardio", sets:1, reps:"4–6 × 2–3 min", rpe:"RPE 8–9",
                  note:"Near max effort uphill. Easy jog down, 2–3 min recovery." },
                { id:"wed-calf",  text:"DB Calf Raises", type:"strength", sets:3, reps:"15–20", note:"Pause at top, rest 45s." },
              ] : [
                { id:"wed-wu", text:"Easy rowing warm-up — 10 min", type:"warmup" },
                { id:"wed-i1", text:"Interval 1 — Row 4 min HARD", type:"cardio", rpe:"RPE 9",
                  note:"90–95% max HR. Damper 4–6, stroke rate 24–28 spm. Note your 500m split." },
                { id:"wed-r1", text:"Recovery row — 3 min easy", type:"cardio", rpe:"RPE 4" },
                { id:"wed-i2", text:"Interval 2 — Row 4 min HARD", type:"cardio", rpe:"RPE 9", note:"Match or beat interval 1 split." },
                { id:"wed-r2", text:"Recovery row — 3 min easy", type:"cardio", rpe:"RPE 4" },
                { id:"wed-i3", text:"Interval 3 — Row 4 min HARD", type:"cardio", rpe:"RPE 9" },
                { id:"wed-r3", text:"Recovery row — 3 min easy", type:"cardio", rpe:"RPE 4" },
                { id:"wed-i4", text:"Interval 4 — Row 4 min HARD", type:"cardio", rpe:"RPE 9–10",
                  note:"Should be absolute limit. If it feels like interval 1, you went too easy." },
                { id:"wed-cd",    text:"Easy rowing cool-down — 10 min", type:"warmup" },
                { id:"wed-calf2", text:"DB Calf Raises", type:"strength", sets:3, reps:"15–20", note:"Pause at top, rest 45s." },
              ]
            },
          ]
        },
        4: {
          title:"Yoga + Back", icon:"🧘",
          sessions:[
            { time:"AM", label:"Yoga / Pilates", items:[
              { id:"thu-yoga",   text:"Yoga or Pilates — 45–60 min", type:"warmup",
                note:"Hip mobility: pigeon 2 min/side, 90/90, lizard. Hamstrings, spinal mobility." },
              { id:"thu-breath", text:"Nasal breath work — 5–10 min", type:"warmup",
                note:"Box breathing or extended exhale. Altitude prep." },
            ]},
            { time:"PM", label:"Crossover Symmetry + Back", items:[
              { id:"thu-cross",  text:"Crossover Symmetry warm-up — 10 min", type:"warmup" },
              { id:"thu-pullup", text:"Weighted Pull-Ups", type:"strength", sets:4, reps:"3–5", rpe:"RPE 8–9",
                note:"Rest 2–3 min. Superset A with RDL.", superset:"A",
                progressive:true, repCeiling:{base:6,build:5,peak:4} },
              { id:"thu-rdl",    text:"Romanian Deadlift", type:"strength", sets:3, reps:"6–8", rpe:"RPE 7–8",
                note:"Superset A. Rest 90s.", superset:"A" },
              { id:"thu-row",    text:"DB Rows", type:"strength", sets:3, reps:"10–12/arm", rpe:"RPE 7–8",
                note:"Superset B with dead hangs. Rest 75s.", superset:"B" },
              { id:"thu-hang",   text:"Dead Hangs", type:"strength", sets:2, reps:"40 sec",
                note:"Superset B. Grip and shoulder stability.", superset:"B" },
              { id:"thu-ttb",    text:"Strict Toes to Bar", type:"strength", sets:3, reps:"8–10", rpe:"RPE 8",
                note:"No kip. Full control. Core must be fresh." },
            ]},
          ]
        },
        5: {
          title:"Zone 2 + Upper", icon:"💪",
          sessions:[
            { time:"AM", label:"Zone 2 Run", items:[
              { id:"fri-z2", text:"Zone 2 Run — 30–40 min", type:"cardio", rpe:"RPE 5–6",
                note:"Nasal breathing only. Keep it genuinely easy — Saturday hike follows." },
            ]},
            { time:"PM", label:"Crossover Symmetry + Upper", items:[
              { id:"fri-cross",    text:"Crossover Symmetry warm-up — 10 min", type:"warmup" },
              { id:"fri-bench",    text:"Bench Press", type:"strength", sets:3, reps:"5", rpe:"RPE 8",
                note:"Standalone. Heavy and fresh. Rest 2 min.",
                progressive:true, repCeiling:{base:6,build:5,peak:4} },
              { id:"fri-incline",  text:"Incline DB Press", type:"strength", sets:3, reps:"8–10", rpe:"RPE 7–8",
                note:"Superset A with Y raises. Rest 75s.", superset:"A",
                progressive:true, repCeiling:{base:12,build:10,peak:8} },
              { id:"fri-yraise",   text:"Prone DB Y Raises", type:"strength", sets:3, reps:"12–15",
                note:"Light 10–15 lb. Superset A. Rotator cuff + lower trap.", superset:"A" },
              { id:"fri-ohpress",  text:"DB Shoulder Press", type:"strength", sets:3, reps:"8–10", rpe:"RPE 7–8",
                note:"Superset B with pull-aparts. Rest 60s.", superset:"B",
                progressive:true, repCeiling:{base:12,build:10,peak:8} },
              { id:"fri-pullapart",text:"Band Pull-Aparts", type:"strength", sets:3, reps:"20",
                note:"Superset B. Shoulder health.", superset:"B" },
              { id:"fri-dips",     text:"Dips", type:"strength", sets:2, reps:"max",
                note:"Finisher. Full lockout at top." },
            ]},
          ]
        },
        6: {
          title:"Long Hike", icon:"⛰️",
          sessions:[
            { time:"ALL DAY", label:"Weighted Hike", items:[
              { id:"sat-hike", text:`Long Hike — ${pd.hike} @ ${pd.hikeWeight} pack`, type:"cardio", rpe:"RPE 6–7",
                note:"Target pace 2.5–3 mph. Seek elevation gain — 500–1000+ ft ideal. Always carry weight." },
            ]},
          ]
        },
        0: {
          title:"Rest + Yoga", icon:"☀️",
          sessions:[
            { time:"AM", label:"Yoga + Full Rest", items:[
              { id:"sun-yoga", text:"Yoga — 45–60 min", type:"warmup",
                note:"Active recovery. No pack, no running. Non-negotiable rest day." },
            ]},
          ]
        },
      };
      return days[dow] || null;
    }

    // ============================================================
    // STORAGE
    // ============================================================
    const sKey = (d,id) => `ec_${d.toISOString().split('T')[0]}_${id}`;
    const lKey = (d,id) => `eclog_${d.toISOString().split('T')[0]}_${id}`;
    function getChecked(d,id)    { try { return localStorage.getItem(sKey(d,id))==="1"; } catch { return false; } }
    function setChecked(d,id,v)  { try { localStorage.setItem(sKey(d,id),v?"1":"0"); } catch {} }
    function getLog(d,id)        { try { return JSON.parse(localStorage.getItem(lKey(d,id))||"null"); } catch { return null; } }
    function setLog(d,id,data)   { try { localStorage.setItem(lKey(d,id),JSON.stringify(data)); } catch {} }
    function getPrevLog(d,id) {
      for (let i=1;i<=21;i++){const x=new Date(d);x.setDate(x.getDate()-i);const l=getLog(x,id);if(l)return{...l,date:x};}
      return null;
    }

    // ============================================================
    // UI COMPONENTS
    // ============================================================
    function Pill({ children, color="#2563eb", bg="#eff6ff", border="#bfdbfe" }) {
      return (
        <span style={{
          background:bg, color, border:`1px solid ${border}`,
          fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:20,
          letterSpacing:0.3, whiteSpace:"nowrap", display:"inline-block",
        }}>{children}</span>
      );
    }

    function RepCeilingBadge({ item, phaseName, log }) {
      if (!item.progressive || !log?.actualReps) return null;
      const ceiling = item.repCeiling?.[phaseName.toLowerCase()] || 10;
      const n = parseInt(String(log.actualReps).split("x").pop()) || 0;
      if (n >= ceiling)   return <Pill color="#fff" bg={T.danger} border={T.danger}>↑ ADD WEIGHT</Pill>;
      if (n >= ceiling-2) return <Pill color={T.warning} bg={T.warningLight} border="#fcd34d">NEAR CEILING</Pill>;
      return null;
    }

    function WorkoutItem({ item, date, phaseName, onToggle }) {
      const [checked, setC] = useState(() => getChecked(date, item.id));
      const [showLog, setShowLog] = useState(false);
      const [log, setL] = useState(() => getLog(date, item.id));
      const [tmp, setTmp] = useState({ weight:"", actualReps:"", notes:"" });
      const prev = getPrevLog(date, item.id);

      function toggle() { const v=!checked; setC(v); setChecked(date,item.id,v); onToggle?.(); }
      function save()   { const d={...tmp,savedAt:new Date().toISOString()}; setLog(date,item.id,d); setL(d); setShowLog(false); }

      const typeMap = {
        warmup:   { label:"WARMUP",   color:T.gray,    bg:T.grayLight,  border:T.border },
        cardio:   { label:"CARDIO",   color:T.blue,    bg:T.blueLight,  border:T.blueMid },
        strength: { label:"STRENGTH", color:"#1e3a8a", bg:"#eef2ff",    border:"#a5b4fc" },
      };
      const tm = typeMap[item.type] || typeMap.warmup;

      return (
        <div style={{
          background: checked ? T.successLight : T.surface,
          border: `1px solid ${checked ? "#bbf7d0" : T.border}`,
          borderRadius:10, padding:"11px 14px", marginBottom:6, transition:"all 0.15s",
        }}>
          <div style={{display:"flex", alignItems:"flex-start", gap:10}}>
            <button onClick={toggle} style={{
              width:22, height:22, minWidth:22, borderRadius:6, marginTop:2, flexShrink:0,
              border:`2px solid ${checked ? T.success : T.border}`,
              background: checked ? T.success : T.surface,
              cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
            }}>
              {checked && <span style={{color:"#fff",fontSize:12,fontWeight:900,lineHeight:1}}>✓</span>}
            </button>

            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",flexWrap:"wrap",gap:5,marginBottom:5}}>
                <span style={{
                  color:checked?T.textMuted:T.text, fontWeight:600, fontSize:14,
                  textDecoration:checked?"line-through":"none", textDecorationColor:T.border,
                }}>{item.text}</span>
                {item.superset && <Pill color={T.blue} bg={T.blueLight} border={T.blueMid}>SS·{item.superset}</Pill>}
                <RepCeilingBadge item={item} phaseName={phaseName} log={log} />
              </div>

              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:5}}>
                <Pill color={tm.color} bg={tm.bg} border={tm.border}>{tm.label}</Pill>
                {item.sets && <Pill color={T.textSecondary} bg={T.grayLight} border={T.border}>{item.sets} sets</Pill>}
                {item.reps && <Pill color={T.textSecondary} bg={T.grayLight} border={T.border}>{item.reps} reps</Pill>}
                {item.rpe  && <Pill color={T.blue} bg={T.blueLight} border={T.blueMid}>{item.rpe}</Pill>}
              </div>

              {item.note && <p style={{color:T.textMuted,fontSize:12,lineHeight:1.6,margin:"0 0 5px 0"}}>{item.note}</p>}

              {prev && item.progressive && (
                <div style={{padding:"5px 10px",borderRadius:7,marginBottom:5,background:"#f0f9ff",border:"1px solid #bae6fd"}}>
                  <span style={{color:"#0369a1",fontSize:11,fontWeight:600}}>
                    Last ({prev.date.toLocaleDateString('en-US',{month:'short',day:'numeric'})}):
                    {prev.weight?` ${prev.weight}`:""}
                    {prev.actualReps?` × ${prev.actualReps}`:""}
                    {prev.notes?` · ${prev.notes}`:""}
                  </span>
                </div>
              )}

              {log && (
                <div style={{padding:"5px 10px",borderRadius:7,marginBottom:5,background:T.successLight,border:"1px solid #bbf7d0"}}>
                  <span style={{color:T.success,fontSize:11,fontWeight:600}}>
                    Logged: {log.weight||""}{log.actualReps?` · ${log.actualReps} reps`:""}{log.notes?` · ${log.notes}`:""}
                  </span>
                </div>
              )}

              {(item.type==="strength"||item.progressive) && (
                <button onClick={()=>{setTmp(log||{weight:"",actualReps:"",notes:""});setShowLog(!showLog);}}
                  style={{background:"transparent",border:`1px solid ${T.border}`,borderRadius:6,
                    color:T.textMuted,fontSize:11,padding:"3px 10px",cursor:"pointer"}}>
                  {showLog?"Cancel":log?"Edit log":"Log performance"}
                </button>
              )}

              {showLog && (
                <div style={{marginTop:8,padding:10,borderRadius:8,background:T.surfaceAlt,border:`1px solid ${T.border}`}}>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:6}}>
                    <input placeholder="Weight (e.g. 80 lb)" value={tmp.weight}
                      onChange={e=>setTmp(p=>({...p,weight:e.target.value}))}
                      style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,
                        color:T.text,padding:"6px 10px",fontSize:12,flex:1,minWidth:100,outline:"none"}} />
                    <input placeholder={item.progressive?"Reps (e.g. 4x8)":"Reps"} value={tmp.actualReps}
                      onChange={e=>setTmp(p=>({...p,actualReps:e.target.value}))}
                      style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,
                        color:T.text,padding:"6px 10px",fontSize:12,flex:1,minWidth:100,outline:"none"}} />
                  </div>
                  <input placeholder="Notes (optional)" value={tmp.notes}
                    onChange={e=>setTmp(p=>({...p,notes:e.target.value}))}
                    style={{background:T.surface,border:`1px solid ${T.border}`,borderRadius:7,
                      color:T.text,padding:"6px 10px",fontSize:12,width:"100%",boxSizing:"border-box",outline:"none"}} />
                  <button onClick={save} style={{marginTop:8,background:T.blue,color:"#fff",
                    border:"none",borderRadius:7,padding:"6px 18px",fontWeight:700,fontSize:12,cursor:"pointer"}}>
                    Save
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function SessionBlock({ session, date, phaseName, onToggle }) {
      return (
        <div style={{marginBottom:18}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}>
            <span style={{background:T.grayLight,color:T.gray,fontSize:10,fontWeight:700,
              padding:"2px 10px",borderRadius:20,letterSpacing:1.5}}>{session.time}</span>
            <span style={{color:T.textSecondary,fontSize:13,fontWeight:600}}>{session.label}</span>
          </div>
          {session.items.map(item=>(
            <WorkoutItem key={item.id} item={item} date={date} phaseName={phaseName} onToggle={onToggle} />
          ))}
        </div>
      );
    }

    function DayView({ date }) {
      const [, tick] = useState(0);
      const weekNum = getWeekNum(date);
      const phase = getPhase(weekNum);
      const workout = getDayWorkout(date.getDay(), weekNum);
      if (!workout) return <div style={{textAlign:"center",color:T.textMuted,padding:48}}>No workout for this day.</div>;
      const allItems = workout.sessions.flatMap(s=>s.items);
      const done = allItems.filter(i=>getChecked(date,i.id)).length;
      const pct = allItems.length ? Math.round((done/allItems.length)*100) : 0;
      const hc = getHyroxCycle(weekNum);
      const hyroxLabels = {1:"Heavy Week",2:"Cardio Week",3:"Simulation Week"};
      return (
        <div>
          <div style={{background:phase.light,border:`1.5px solid ${phase.border}`,borderRadius:14,padding:"16px 18px",marginBottom:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:28,marginBottom:4}}>{workout.icon}</div>
                <div style={{color:T.text,fontSize:20,fontWeight:800}}>{workout.title}</div>
                <div style={{color:T.textMuted,fontSize:12,marginTop:3}}>
                  Week {weekNum} · {phase.name} Phase
                  {date.getDay()===3&&` · ${getWedType(weekNum)==="zone2hills"?"Zone 2 + Hills":"Norwegian 4x4"}`}
                  {date.getDay()===2&&` · Hyrox ${hyroxLabels[hc]}`}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{color:phase.color,fontSize:32,fontWeight:900,lineHeight:1}}>{pct}%</div>
                <div style={{color:T.textMuted,fontSize:11,marginTop:2}}>{done}/{allItems.length} done</div>
              </div>
            </div>
            <div style={{marginTop:12,background:"rgba(0,0,0,0.07)",borderRadius:99,height:6}}>
              <div style={{width:`${pct}%`,height:"100%",borderRadius:99,background:phase.color,transition:"width 0.3s"}}/>
            </div>
          </div>
          {workout.sessions.map((s,i)=>(
            <SessionBlock key={i} session={s} date={date} phaseName={phase.name} onToggle={()=>tick(n=>n+1)} />
          ))}
        </div>
      );
    }

    function WeekStrip({ selectedDate, onSelect }) {
      const ws = new Date(selectedDate);
      ws.setDate(selectedDate.getDate()-selectedDate.getDay());
      const today = new Date();
      const days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const icons=["☀️","🏔️","⚡","🚣","🧘","💪","⛰️"];
      return (
        <div style={{display:"flex",gap:4,marginBottom:14}}>
          {days.map((d,i)=>{
            const day=new Date(ws); day.setDate(ws.getDate()+i);
            const isSel=day.toDateString()===selectedDate.toDateString();
            const isToday=day.toDateString()===today.toDateString();
            const ok=day>=PROGRAM_START&&day<=PROGRAM_END;
            return (
              <button key={i} onClick={()=>ok&&onSelect(new Date(day))} style={{
                flex:1,padding:"7px 2px",borderRadius:10,textAlign:"center",
                background:isSel?T.blue:isToday?T.blueLight:T.surfaceAlt,
                border:`1.5px solid ${isSel?T.blue:isToday?T.blueMid:T.borderLight}`,
                cursor:ok?"pointer":"default",opacity:ok?1:0.35,
              }}>
                <div style={{fontSize:8,color:isSel?"rgba(255,255,255,0.7)":T.textMuted,letterSpacing:0.5,marginBottom:1}}>{d}</div>
                <div style={{fontSize:13}}>{icons[i]}</div>
                <div style={{fontSize:11,fontWeight:isToday?700:400,color:isSel?"#fff":isToday?T.blue:T.textSecondary}}>
                  {day.getDate()}
                </div>
              </button>
            );
          })}
        </div>
      );
    }

    function ProgramCalendar({ onSelect }) {
      const weeks=[];
      let cur=new Date(PROGRAM_START),wn=1;
      while(cur<=PROGRAM_END){
        const end=new Date(cur); end.setDate(cur.getDate()+6);
        weeks.push({start:new Date(cur),end,weekNum:wn,phase:getPhase(wn)});
        cur.setDate(cur.getDate()+7); wn++;
      }
      return (
        <div style={{overflowY:"auto",maxHeight:"65vh",paddingBottom:20}}>
          {PHASES.map(ph=>{
            const phWeeks=weeks.filter(w=>ph.weeks.includes(w.weekNum));
            return (
              <div key={ph.name} style={{marginBottom:20}}>
                <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 0",marginBottom:8,borderBottom:`2px solid ${ph.border}`}}>
                  <div style={{width:9,height:9,borderRadius:"50%",background:ph.color}}/>
                  <span style={{color:ph.color,fontWeight:700,fontSize:12,letterSpacing:1}}>{ph.name.toUpperCase()} PHASE</span>
                </div>
                {phWeeks.map(w=>{
                  const pd=getPhaseData(w.weekNum);
                  return (
                    <div key={w.weekNum} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",
                      borderRadius:10,marginBottom:4,background:T.surface,border:`1px solid ${T.border}`}}>
                      <span style={{color:ph.color,fontWeight:800,fontSize:12,minWidth:26,textAlign:"center"}}>W{w.weekNum}</span>
                      <div style={{flex:1}}>
                        <div style={{color:T.text,fontSize:12,fontWeight:600}}>
                          {w.start.toLocaleDateString('en-US',{month:'short',day:'numeric'})} — {w.end.toLocaleDateString('en-US',{month:'short',day:'numeric'})}
                        </div>
                        <div style={{color:T.textMuted,fontSize:11,marginTop:1}}>{pd.ruck} ruck · {pd.weight} · {pd.hike} hike</div>
                      </div>
                      <button onClick={()=>onSelect(new Date(w.start))} style={{
                        background:T.blueLight,border:`1px solid ${T.blueMid}`,borderRadius:7,
                        color:T.blue,fontSize:11,fontWeight:600,padding:"4px 12px",cursor:"pointer"}}>Go →</button>
                    </div>
                  );
                })}
              </div>
            );
          })}
          <div style={{padding:"14px 16px",borderRadius:12,background:"linear-gradient(135deg,#1e3a8a,#2563eb)",border:"1px solid #3b82f6"}}>
            <div style={{color:"#fff",fontWeight:700,fontSize:13}}>🏔️ Summit Day — July 9, 2026</div>
            <div style={{color:"rgba(255,255,255,0.7)",fontSize:11,marginTop:2}}>Cotopaxi & Chimborazo · 11 days after program end</div>
          </div>
        </div>
      );
    }

    // ============================================================
    // APP
    // ============================================================
    function App() {
      const today = new Date();
      const init = today>=PROGRAM_START&&today<=PROGRAM_END ? today : new Date(PROGRAM_START);
      const [date,setDate] = useState(init);
      const [view,setView] = useState("day");
      const weekNum=getWeekNum(date);
      const phase=getPhase(weekNum);
      function goDay(n){const d=new Date(date);d.setDate(d.getDate()+n);if(d>=PROGRAM_START&&d<=PROGRAM_END)setDate(d);}
      const dayNames=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
      const monthNames=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      const weeksLeft=Math.max(0,16-weekNum+1);
      return (
        <div style={{minHeight:"100vh",background:T.bg,color:T.text,
          fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",maxWidth:480,margin:"0 auto"}}>
          <div style={{background:T.surface,borderBottom:`1px solid ${T.border}`,padding:"16px 16px 12px",
            position:"sticky",top:0,zIndex:10,boxShadow:"0 1px 8px rgba(0,0,0,0.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontSize:10,color:T.textMuted,letterSpacing:2,fontWeight:700,marginBottom:2}}>ECUADOR TRAINING</div>
                <div style={{fontSize:17,fontWeight:800,color:T.text,lineHeight:1.2}}>Cotopaxi & Chimborazo</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
                <div style={{background:phase.light,color:phase.color,border:`1px solid ${phase.border}`,
                  fontSize:10,fontWeight:700,padding:"3px 10px",borderRadius:20}}>
                  {phase.name.toUpperCase()} · W{weekNum}
                </div>
                <div style={{color:T.textMuted,fontSize:10}}>{weeksLeft}w to summit 🏔️</div>
              </div>
            </div>
            <div style={{display:"flex",gap:4,marginBottom:12,background:T.surfaceAlt,padding:4,borderRadius:10}}>
              {[["day","Workout"],["calendar","Calendar"]].map(([v,label])=>(
                <button key={v} onClick={()=>setView(v)} style={{flex:1,padding:"7px",borderRadius:7,
                  background:view===v?T.surface:"transparent",border:`1px solid ${view===v?T.border:"transparent"}`,
                  color:view===v?T.blue:T.textMuted,fontSize:12,fontWeight:view===v?700:500,cursor:"pointer",
                  boxShadow:view===v?"0 1px 4px rgba(0,0,0,0.07)":"none"}}>{label}</button>
              ))}
            </div>
            {view==="day" && (
              <>
                <WeekStrip selectedDate={date} onSelect={setDate} />
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <button onClick={()=>goDay(-1)} style={{background:T.surface,border:`1px solid ${T.border}`,
                    borderRadius:8,color:T.textSecondary,padding:"6px 14px",fontSize:12,fontWeight:500,cursor:"pointer"}}>← Prev</button>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:14,fontWeight:700,color:T.text}}>
                      {dayNames[date.getDay()]}, {monthNames[date.getMonth()]} {date.getDate()}
                    </div>
                    {date.toDateString()===today.toDateString()&&(
                      <div style={{fontSize:10,color:T.blue,fontWeight:700,letterSpacing:1}}>TODAY</div>
                    )}
                  </div>
                  <button onClick={()=>goDay(1)} style={{background:T.surface,border:`1px solid ${T.border}`,
                    borderRadius:8,color:T.textSecondary,padding:"6px 14px",fontSize:12,fontWeight:500,cursor:"pointer"}}>Next →</button>
                </div>
              </>
            )}
          </div>
          <div style={{padding:"16px 16px 48px"}}>
            {view==="day"      && <DayView date={date} />}
            {view==="calendar" && <ProgramCalendar onSelect={d=>{setDate(d);setView("day");}} />}
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
